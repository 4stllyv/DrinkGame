<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party Game</title>

<style>
body {
  margin: 0;
  padding: 0;

  font-family: Arial;
  color: white;

  display: block;
  flex-direction: column;
  align-items: center;
  padding-bottom: 40px;
  justify-content: center;
  
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
  background-size: 300% 300%;
  animation: bgMove 8s ease infinite;
}

  @keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}


#menu {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#menu,
.game {
  width: 90%;
  max-width: 400px;

  margin: 40px auto;

  display: none;
  flex-direction: column;
  align-items: center;
}


.show {
  display: flex;
}

input {
  width: 100px;
  font-size: 20px;
  text-align: center;

  margin: 10px;
  padding: 10px;

  border-radius: 10px;
}


h1 {
  font-size: 42px;
  text-shadow: 
    0 0 10px white,
    0 0 20px #ff6ec7,
    0 0 30px #00f2ff;
}

h1, h2 {
  margin-bottom: 20px;
}

button {
  width: 100%;
  max-width: 300px;

  padding: 16px;
  margin: 12px 0;

  font-size: 18px;

  border-radius: 30px;

  background: linear-gradient(45deg, #ff6ec7, #00f2ff);
  color: white;
  
  border: none;

  box-shadow: 
    0 5px 0 #000,
    0 10px 20px rgba(0,0,0,0.3);

  transition: 0.2s;

}

.game {
  display: none;
  animation: popIn 0.5s ease;
}

@keyframes popIn {
  0% {
    transform: scale(0.8);
    opacity: 0;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}


.result {
  font-size: 28px;
  margin: 20px;
}

.big-btn {
  padding: 20px 50px;
  font-size: 24px;
}

.game.show {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

button:active {
  transform: translateY(5px);
  box-shadow: 
    0 2px 0 #000,
    0 5px 10px rgba(0,0,0,0.3);
}

button:hover {
  transform: scale(1.05);
}

:root {
  --main: #ff6ec7;
  --accent: #00f2ff;
}


/* ルーレット */
#wheelContainer {
  position: relative;
  width: 220px;
  margin: 30px auto;
}

canvas {
  border-radius: 50%;
  border: 5px solid white;
}

#pointer {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%) rotate(180deg);
  font-size: 30px;
}

/* 王様ゲーム */
.card {
  width: 60%;
  max-width: 200px;
  height: 120px;

  margin: 40px auto;
  
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;


  perspective: 800px;
  cursor: pointer;
}

.card div {
  width: 100%;
  height: 100%;
  border-radius: 15px;

  position: absolute;
  backface-visibility: hidden;

  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 32px;
  font-weight: bold;
}

/* 表（？） */
.front {
  background: white;
  color: black;
}

/* 裏（結果） */
.back {
  background: linear-gradient(45deg, #ff6a00, #ff3c00);
  color: white;
  transform: rotateY(180deg);
}

/* 回転 */
.card.flip {
  transform: rotateY(180deg);
  transition: 0.6s;
}

#counter {
  display: flex;
  align-items: center;
  gap: 20px;
  margin: 20px;
}

#counter button {
  width: 50px;
  height: 50px;
  font-size: 24px;
  border-radius: 50%;

  display: flex;       
  justify-content: center;    
  align-items: center;       
}

#countDisplay {
  font-size: 28px;
  font-weight: bold;
}

.card.start {
  transform: scale(1.1);
  transition: 0.3s;
}

.king-hit {
  animation: boom 0.4s ease;
  background: gold !important;
  color: black !important;
  font-size: 36px;
}

@keyframes boom {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}




/* 反射神経ゲーム */
/* 全体中央配置 */
#reaction {
  padding-top: 40px;
}

#reaction.game {
  display: none;
}

#reaction.show {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 70dvh;
  gap: 20px;
}

/* テキスト */
#reactionText {
  font-size: 36px;
  margin-bottom: 40px;
}

/* スタートボタン（超重要🔥） */
#reactionBtn {
  width: 200px;
  height: 80px;
  font-size: 24px;
  font-weight: bold;

  border: none;
  border-radius: 40px;
  cursor: pointer;

  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;

  box-shadow: 0 8px 20px rgba(0,0,0,0.3);

  margin-bottom: 60px;

  transition: 0.2s;
}

/* 押した時 */
#reactionBtn:active {
  transform: scale(0.95);
}

/* 戻るボタン */
#reaction button:last-child {
  width: 140px;
  height: 50px;

  border-radius: 25px;
}

.go {
  color: #ff3c00;
  font-weight: bold;
  animation: flash 0.2s infinite alternate;
  }

  @keyframes flash {
  from { opacity: 1; }
  to { opacity: 0.5; }
  }

/* チンチロ */
#diceArea {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin: 30px 0;
}

.dice {
  width: 60px;
  height: 60px;
  background: white;
  border-radius: 10px;

  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  
  gap: 2px; 

  padding: 10px;  
  
    
  box-shadow:
  0 6px 0 #ff6ec7,
  0 10px 20px rgba(0,0,0,0.4);


}

.dot {
  width: 17px;
  height: 17px;
  background: black;
  border-radius: 50%;
  justify-self: center;
  align-self: center;
  margin: auto;
}






</style>

</head>
<body>

<!-- 🎮 メニュー -->
<div id="menu">
  <h1>🎮 Party Game</h1>
  <button onclick="showGame('roulette')">ルーレット</button><br>
  <button onclick="showGame('king')">王様ゲーム</button><br>
  <button onclick="showGame('reaction')">反射神経ゲーム</button><br>
  <button onclick="showGame('dice')">チンチロ</button>
</div>

<!-- 🎯 ルーレット -->
<div id="roulette" class="game">
  <h2>🎯 ルーレット</h2>

  <div id="wheelContainer">
    <div id="pointer">▲</div>
    <canvas id="rouletteCanvas" width="220" height="220"></canvas>
  </div>

  <div id="rouletteResult" class="result">スタート！</div>

  <button onclick="spinRoulette()">回す</button><br>
  <button onclick="back()">戻る</button>
</div>

<!--　🫅 王様ゲーム -->
<div id="king" class="game">
  <h2>👑 王様ゲーム</h2>

  <div class="card" id="kingCard">
    <div class="front">？</div>
    <div class="back"></div>
  </div>

  <div id="counter">
  <button onclick="changeCount(-1)">−</button>
  <span id="countDisplay">3</span>
  <button onclick="changeCount(1)">＋</button>
  </div>



  <button onclick="startKingGame()">スタート</button>
  <button onclick="back()">戻る</button>
</div>

<!-- ⚡ 反射ゲーム -->
<div id="reaction" class="game">
  <h2>⚡ 反射神経ゲーム</h2>

  <div id="reactionText" class="result">GO!の合図でボタンを押せ</div>

  <button id="reactionBtn">スタート</button>
  <button onclick="back()">戻る</button>
</div>

<!-- 🎲　チンチロ　 -->
<div id="dice" class="game">
  <h2>🎲 チンチロ</h2>

  <div id="diceArea">
  <div class="dice" id="d1">1</div>
  <div class="dice" id="d2">1</div>
  <div class="dice" id="d3">1</div>
</div>

<div id="diceText"></div>

  <button onclick="rollDice()">振る</button>
  <button onclick="back()">戻る</button>
</div>



<script>
document.getElementById('menu').style.display = 'flex';
// 🔄 画面切り替え
function showGame(id) {
  document.getElementById('menu').style.display = 'none';
  document.querySelectorAll('.game').forEach(g => {
    g.classList.remove('show');
  });
  document.getElementById(id).classList.add('show');
}

function back() {
  document.getElementById('menu').style.display = 'flex';

  document.querySelectorAll('.game').forEach(g => {
    g.classList.remove('show');
  });
}



// 🎯 ルーレット
const rouletteList = [
  "🍺飲む",
  "😎セーフ",
  "🔥全員",
  "👉指名",
  "🎉もう一回"
];

const colors = [
  "#ff7675", "#74b9ff", "#55efc4",
  "#ffeaa7", "#fd79a8", "#a29bfe"
];

function drawWheel(rotation = 0) {
  const canvas = document.getElementById('rouletteCanvas');
  const ctx = canvas.getContext('2d');

  const size = canvas.width;
  const center = size / 2;
  const radius = center;

  const slice = (2 * Math.PI) / rouletteList.length;

  ctx.clearRect(0, 0, size, size);

  ctx.save();
  ctx.translate(center, center);
  ctx.rotate(rotation);


  for (let i = 0; i < rouletteList.length; i++) {
    const start = i * slice;
    const end = start + slice;

    // 色
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, radius, start, end);
    ctx.fillStyle = colors[i];
    ctx.fill();

    // 文字
    ctx.save();
    ctx.rotate(start + slice / 2);

    ctx.fillStyle = "#333";
    ctx.font = "14px Arial";
    ctx.textAlign = "center";

    ctx.fillText(rouletteList[i], radius * 0.65, 5);
    ctx.restore();
  }

  ctx.restore();
}

let currentRotation = 0;
let isSpinning = false;

function spinRoulette() {
  if (isSpinning) return;
  isSpinning = true;

  const slice = (2 * Math.PI) / rouletteList.length;

  const start = currentRotation;
  const end = currentRotation + Math.PI * 8 + Math.random() * Math.PI * 2;

  const duration = 4000;
  const startTime = performance.now();

  function animate(time) {
    let progress = (time - startTime) / duration;
    if (progress > 1) progress = 1;

    const ease = 1 - Math.pow(1 - progress, 3);
    const angle = start + (end - start) * ease;

    drawWheel(angle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentRotation = angle;

      // ✅ ここが本質（回転から計算）
      let normalized = angle % (2 * Math.PI);
      if (normalized < 0) normalized += 2 * Math.PI;

      // ✅ 矢印は「真上」なので基準をそこに固定
      let pointerAngle = (Math.PI * 1.5 - normalized) % (2 * Math.PI);
      if (pointerAngle < 0) pointerAngle += 2 * Math.PI;

      // ✅ セクション中央で判定（微調整不要）
      let index = Math.floor(pointerAngle / slice);

      document.getElementById("rouletteResult").textContent =
      rouletteList[index];

      isSpinning = false;
    }
  }

  requestAnimationFrame(animate);
}




drawWheel();



// 🫅 王様ゲーム
let players = [];

let count = 3;

function changeCount(num) {
  count += num;

  if (count < 3) count = 3;
  if (count > 12) count = 12;

  document.getElementById("countDisplay").textContent = count;
}


function startKingGame() {
  const total = count;

  players = [];

  players.push("👑 王様");

  for (let i = 1; i < total; i++) {
    players.push(i + "番");
  }

  // シャッフル
  for (let i = players.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [players[i], players[j]] = [players[j], players[i]];
  }

  const front = document.querySelector("#kingCard .front");
  const back = document.querySelector("#kingCard .back");
  const card = document.getElementById("kingCard");

  card.classList.add("start");

  setTimeout(() => {
  card.classList.remove("start");
  showPlayer(0);
  }, 1200);


  // ✅ ここ追加（スタート演出）
  front.textContent = "START!";
  back.textContent = "";
  card.classList.remove("flip");

  // ✅ 少し待ってから開始
  setTimeout(() => {
    showPlayer(0);
  }, 1200);
}


function showPlayer(index) {
  const card = document.getElementById("kingCard");
  const front = card.querySelector(".front");
  const back = card.querySelector(".back");

  front.textContent = "？";
  back.textContent = "";
  card.classList.remove("flip");

  card.onclick = function () {

    back.textContent = players[index];

    card.classList.add("flip");

    // ✅ ここ追加🔥
    if (players[index].includes("王様")) {
      back.classList.add("king-hit");

      // 一瞬で元に戻す
      setTimeout(() => {
        back.classList.remove("king-hit");
      }, 400);

      // ✅ ドン表示（追加）
      front.textContent = "💥";
    }

    setTimeout(() => {
      if (index + 1 < players.length) {
        showPlayer(index + 1);
      } else {
        front.textContent = "終了！";
        card.classList.remove("flip");
      }
    }, 1500);
  };
}




// ⚡ 反射ゲーム
let reactionStart = null;
let timerId = null;
let state = "idle"; // idle / waiting / ready

const btn = document.getElementById("reactionBtn");
const text = document.getElementById("reactionText");

btn.addEventListener("click", function() {

  // 🎯 ① スタート状態
  if (state === "idle") {

    text.textContent = "READY...";
    state = "waiting";

    const delay = Math.random() * 3000 + 2000;

    timerId = setTimeout(() => {
      text.textContent = "GO!";
      text.className = "result go";
      state = "ready";
      reactionStart = Date.now();
      btn.textContent = "STOP";
    }, delay);

  }

  // 💀 ② フライング
  else if (state === "waiting") {

    clearTimeout(timerId);

    text.textContent = "💀 フライング！飲み！";

    state = "idle";
    btn.textContent = "スタート";
  }

  // ✅ ③ GO後（本番）
  else if (state === "ready") {

    const time = Date.now() - reactionStart;

    text.textContent = time + " ms！";
    text.className = "result"

    // 評価
    setTimeout(() => {
      if (time < 250) {
        text.textContent;
      } else if (time < 350) {
        text.textContent;
      } else {
        text.textContent;
      }
    }, 200);

    state = "idle";
    btn.textContent = "スタート";
  }

  });


  // 🎲 チンチロ
  function rollDice() {

  let count = 0;
  let speed = 60;

  function roll() {

    let d1 = rand();
    let d2 = rand();
    let d3 = rand();

    updateDice(d1, d2, d3);

    count++;

    // ✅ 徐々に遅くする
    speed += 10;

    if (count < 20) {
      setTimeout(roll, speed);
    } else {
      showDiceResult(d1, d2, d3);
    }
  }

  roll();
}


function rand() {
  return Math.floor(Math.random() * 6) + 1;
}

function updateDice(a, b, c) {
  drawDots("d1", a);
  drawDots("d2", b);
  drawDots("d3", c);
}

  function showDiceResult(d1, d2, d3) {

  let dice = [d1, d2, d3].sort((a, b) => a - b);

  let text = "";

  if (d1 === 1 && d2 === 1 && d3 === 1) {
    text = "🔥 ピンゾロ";
  } 
  else if (d1 === d2 && d2 === d3) {
    text = "💥 アラシ";
  } 
  else if (dice[0] === 1 && dice[1] === 2 && dice[2] === 3) {
    text = "💀 ヒフミ";
  } 
  else if (dice[0] === 4 && dice[1] === 5 && dice[2] === 6) {
    text = "🎉 シゴロ";
  } 
  else if (d1 === d2 || d1 === d3 || d2 === d3) {
    let main = d1 === d2 ? d3 : (d1 === d3 ? d2 : d1);
    text = `👍 ${main}の目`;
  } 
  else {
    text = "❌ 目なし";
  }

  document.getElementById("diceText").textContent = text;
}

function drawDots(id, num) {
  const dice = document.getElementById(id);

  // リセット
  dice.innerHTML = "";

  // 3x3の位置（0〜8）
  const positions = {
    1: [4],
    2: [0, 8],
    3: [0, 4, 8],
    4: [0, 2, 6, 8],
    5: [0, 2, 4, 6, 8],
    6: [0, 2, 3, 5, 6, 8]
  };

  for (let i = 0; i < 9; i++) {
    const cell = document.createElement("div");

    if (positions[num].includes(i)) {
      const dot = document.createElement("div");
      dot.className = "dot";
      cell.appendChild(dot);
    }

    dice.appendChild(cell);
  }
}

</script>

</body>
</html>
