<html lang="ja">
<head>

<style>
body {
  margin: 0;
  padding: 0;

  font-family: Arial;
  color: white;

  display: block;
  flex-direction: column;
  align-items: center;
  padding-bottom: 40px;

  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);

  animation: bgMove 8s ease infinite;
}

  @keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}


#menu {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#menu,
.game {

  align-items: center;
}


.show {

}

input {

}


h1 {

  text-shadow:

}

button {

  }

  }
}

}

.game.show {

}

button:hover {

<script>

// 🎯 ルーレット
const rouletteList = [
  "🍺飲む",
  "😎セーフ",
  "🔥全員",
  "👉指名",
  "🎉もう一回"
];

const colors = [
  "#ff7675", "#74b9ff", "#55efc4",
  "#ffeaa7", "#fd79a8", "#a29bfe"
];

function resetRoulette() {
  currentRotation = 0;
  drawWheel();

  document.getElementById("rouletteResult").textContent = "スタート！";
}

function drawWheel(rotation = 0) {
  const canvas = document.getElementById('rouletteCanvas');
  const ctx = canvas.getContext('2d');

  const size = canvas.width;
  const center = size / 2;
  const radius = center;

  const slice = (2 * Math.PI) / rouletteList.length;

  ctx.clearRect(0, 0, size, size);

  ctx.save();
  ctx.translate(center, center);
  ctx.rotate(rotation);


  for (let i = 0; i < rouletteList.length; i++) {
    const start = i * slice;
    const end = start + slice;

    // 色
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, radius, start, end);
    ctx.fillStyle = colors[i];
    ctx.fill();

    // 文字
    ctx.save();
    ctx.rotate(start + slice / 2);

    ctx.fillStyle = "#333";
    ctx.font = "14px Arial";
    ctx.textAlign = "center";

    ctx.fillText(rouletteList[i], radius * 0.65, 5);
    ctx.restore();
  }

  ctx.restore();
}

let currentRotation = 0;
let isSpinning = false;

function spinRoulette() {
  if (isSpinning) return;
  isSpinning = true;

  const slice = (2 * Math.PI) / rouletteList.length;

  const start = currentRotation;
  const end = currentRotation + Math.PI * 8 + Math.random() * Math.PI * 2;

  const duration = 4000;
  const startTime = performance.now();

  function animate(time) {
    let progress = (time - startTime) / duration;
    if (progress > 1) progress = 1;

    const ease = 1 - Math.pow(1 - progress, 3);
    const angle = start + (end - start) * ease;

    drawWheel(angle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentRotation = angle;

      // ✅ ここが本質（回転から計算）
      let normalized = angle % (2 * Math.PI);
      if (normalized < 0) normalized += 2 * Math.PI;

      // ✅ 矢印は「真上」なので基準をそこに固定
      let pointerAngle = (Math.PI * 1.5 - normalized) % (2 * Math.PI);
      if (pointerAngle < 0) pointerAngle += 2 * Math.PI;

      // ✅ セクション中央で判定（微調整不要）
      let index = Math.floor(pointerAngle / slice);

      document.getElementById("rouletteResult").textContent =
      rouletteList[index];

      isSpinning = false;
    }
  }

  requestAnimationFrame(animate);
}




drawWheel();

let count = 3;
let kingLevel = 1;
let selected = [];

// count → level → ready → play

const ordersLv1 = [

];

const ordersLv3 = [

// 人数
function changeCount(num) {
  count += num;
  if (count < 3) count = 3;
  if (count > 12) count = 12;
  document.getElementById("countDisplay").textContent = count;
}

// レベル選択
function showLevelSelect() {
  document.getElementById("levelSelect").style.display = "block";
}

function startKingGameWithLevel(level) {
  kingLevel = level;
  document.getElementById("levelSelect").style.display = "none";
  kingState = "ready";
  document.getElementById("kingStartBtn").textContent = "スタート！";
}

// 開始
function startKingGame() {

  canClick = true;

  console.log("スタート押された"); // ✅ デバッグ

  // ✅ UI全部消す（確実に）
  const level = document.getElementById("levelSelect");
  const counter = document.getElementById("counter");
  const startBtn = document.getElementById("kingStartBtn");

  level.style.display = "none";
  counter.style.display = "none";
  startBtn.style.display = "none";

  // ✅ 念押し（バグ防止）
  level.classList.remove("show");

  // ✅ カード表示
  const card = document.getElementById("kingCard");
  card.style.display = "block";

  players = [];

  players.push("👑 王様");

  for (let i = 1; i < count; i++) {
    players.push(i + "番");
  }

  players.sort(() => Math.random() - 0.5);

  showPlayer(0);
}

// カード
function showPlayer(index) {

  canClick = true;
  const card = document.getElementById("kingCard");
  const front = card.querySelector(".front");
  const back = card.querySelector(".back");

  front.textContent = "？";
  back.textContent = "？";
  card.classList.remove("flip");

  card.onclick = function () {

  // ✅ 押せない状態なら無視
  if (!canClick) return;

  // ✅ 押せない状態にする
  canClick = false;

  // ✅ メッセージ消す
  document.getElementById("kingOrder").textContent = "";

  // めくる
  back.textContent = players[index];
  card.classList.add("flip");

  setTimeout(() => {

    // 戻す
    card.classList.remove("flip");
    front.textContent = "？";
    back.textContent = "？";

    if (index + 1 < players.length) {

      // 👉 次の人に回してね
      document.getElementById("kingOrder").textContent =
        "👉 次の人に回してね";

      setTimeout(() => {
        showPlayer(index + 1);
      }, 800);

    } else {

      // 最後の人
      setTimeout(() => {
        endKingGame();
      }, 800);

    }

  }, 1500);
};
}

function endKingGame() {

  document.getElementById("kingCard").style.display = "none";

  const el = document.getElementById("kingOrder");

  if (kingLevel === 3) {

    // お題なし
    el.innerHTML = `
      <div>👑 王様が自由に決めてね</div><br>
      <button onclick="restartKingGame()">もう一度</button>
    `;

  } else {

    // ✅ お題ありはボタン1つだけ
    el.innerHTML = `
      <button onclick="showFinalOrder()">お題を確認する</button>
    `;
  }
}

// 命令表示
function showFinalOrder() {

  let list;

  if (kingLevel === 1) list = ordersLv1;
  else if (kingLevel === 2) list = ordersLv2;

  const order = list[Math.floor(Math.random() * list.length)];

  // ✅ ここでボタン追加！！
  document.getElementById("kingOrder").innerHTML = `
    <div style="margin-bottom:20px;">👑 ${order}</div>
    <button onclick="restartKingGame()">もう一度</button>
  `;
}

function resetKing() {

  const card = document.getElementById("kingCard");

  canClick = true;

  // ✅ カード初期化
  card.classList.remove("flip");
  card.style.display = "none";
  card.querySelector(".front").textContent = "？";
  card.querySelector(".back").textContent = "";

  // ✅ 命令消す
  document.getElementById("kingOrder").textContent = "";

  // ✅ UI完全復元
  document.getElementById("counter").style.display = "flex";

  // 👇 ここ超重要（横並び維持）
  document.getElementById("levelSelect").style.display = "flex";

  document.getElementById("kingStartBtn").style.display = "block";

  // ✅ スタートボタン状態リセット（これが犯人だった）
  document.getElementById("kingStartBtn").disabled = true;

  // ✅ レベルも初期化
  kingLevel = 0;

  // ✅ 選択状態消す
  document.querySelectorAll("#levelSelect button").forEach(btn => {
    btn.classList.remove("level-selected");
  });
}


function setLevel(level) {
  kingLevel = level;

  document.getElementById("kingStartBtn").disabled = false;

  // 選択状態の見た目更新
  document.querySelectorAll("#levelSelect button").forEach(btn => {
    btn.classList.remove("level-selected");
  });

  event.target.classList.add("level-selected");
}

function restartKingGame() {

  // ✅ 表示リセット
  document.getElementById("kingOrder").textContent = "";

  // ✅ カード初期化
  const card = document.getElementById("kingCard");

  card.classList.remove("flip");
  card.style.display = "block";
  card.querySelector(".front").textContent = "？";
  card.querySelector(".back").textContent = "？";

  // ✅ 押せる状態に戻す
  canClick = true;

  // ✅ 人数・レベルはそのまま使う（←これがポイント🔥）

  players = [];

  players.push("👑 王様");

  for (let i = 1; i < count; i++) {
    players.push(i + "番");
  }

  players.sort(() => Math.random() - 0.5);

  // ✅ 0人目から再スタート
  showPlayer(0);
}



// ⚡ 反射ゲーム
let reactionStart = null;
let timerId = null;
let state = "idle"; // idle / waiting / ready

const btn = document.getElementById("reactionBtn");
const text = document.getElementById("reactionText");

btn.addEventListener("click", function() {

  // 🎯 ① スタート状態
  if (state === "idle") {

    text.textContent = "READY...";
    state = "waiting";

    const delay = Math.random() * 3000 + 2000;

    timerId = setTimeout(() => {
      text.textContent = "GO!";
      text.className = "result go";
      state = "ready";
      reactionStart = Date.now();
      btn.textContent = "STOP";
    }, delay);

  }

  // 💀 ② フライング
  else if (state === "waiting") {

    clearTimeout(timerId);

    text.textContent = "💀 フライング！飲み！";

    state = "idle";
    btn.textContent = "スタート";
  }

  // ✅ ③ GO後（本番）
  else if (state === "ready") {

    const time = Date.now() - reactionStart;

    text.textContent = time + " ms！";
    text.className = "result"

    // 評価
    setTimeout(() => {
      if (time < 250) {
        text.textContent;
      } else if (time < 350) {
        text.textContent;
      } else {
        text.textContent;
      }
    }, 200);

    state = "idle";
    btn.textContent = "スタート";
  }

  });

  function resetReaction() {
  state = "idle";

  text.textContent = "GO!でボタンを押せ";
  btn.textContent = "スタート";
}


  // 🎲 チンチロ
  updateDice(1, 1, 1);
  function rollDice() {

  const btn = document.getElementById("rollBtn");

  if (btn.disabled) return;
  btn.disabled = true;

  // ✅ 最終結果
  let d1 = rand();
  let d2 = rand();
  let d3 = rand();

  let i = 0;
  let speed = 50; // 最初の速さ

  function rollAnimation() {

    // ランダムで更新
    updateDice(rand(), rand(), rand());

    i++;

    // ✅ 徐々に遅くする
    speed += 20;

    if (i > 15) {

      // ✅ 最後
      updateDice(d1, d2, d3);
      showDiceResult(d1, d2, d3);

      btn.disabled = false;
      return;
    }

    // ✅ 次のフレーム
    setTimeout(rollAnimation, speed);
  }

  // スタート
  rollAnimation();
}



function rand() {
  return Math.floor(Math.random() * 6) + 1;
}

function updateDice(a, b, c) {
  drawDots("d1", a);
  drawDots("d2", b);
  drawDots("d3", c);
}

  function showDiceResult(d1, d2, d3) {

  let dice = [d1, d2, d3].sort((a, b) => a - b);

  let text = "";

  if (d1 === 1 && d2 === 1 && d3 === 1) {
    text = "🔥 ピンゾロ";
  } 
  else if (d1 === d2 && d2 === d3) {
    text = "💥 アラシ";
  } 
  else if (dice[0] === 1 && dice[1] === 2 && dice[2] === 3) {
    text = "💀 ヒフミ";
  } 
  else if (dice[0] === 4 && dice[1] === 5 && dice[2] === 6) {
    text = "🎉 シゴロ";
  } 
  else if (d1 === d2 || d1 === d3 || d2 === d3) {
    let main = d1 === d2 ? d3 : (d1 === d3 ? d2 : d1);
    text = `👍 ${main}の目`;
  } 
  else {
    text = "❌ 目なし";
  }

  document.getElementById("diceText").textContent = text;
}

function drawDots(id, num) {
  const dice = document.getElementById(id);

  // リセット
  dice.innerHTML = "";

  // 3x3の位置（0〜8）
  const positions = {
    1: [4],
    2: [0, 8],
    3: [0, 4, 8],
    4: [0, 2, 6, 8],
    5: [0, 2, 4, 6, 8],
    6: [0, 2, 3, 5, 6, 8]
  };

  for (let i = 0; i < 9; i++) {
    const cell = document.createElement("div");

    if (positions[num].includes(i)) {
      const dot = document.createElement("div");
      dot.className = "dot";
      cell.appendChild(dot);
    }

    dice.appendChild(cell);
  }
}

function resetDice() {

  // 🎲 サイコロ初期化（全部1に戻す）
  updateDice(1, 1, 1);

  // 結果消す
  document.getElementById("diceText").textContent = "";

  // ✅ ボタン復活
  document.getElementById("rollBtn").disabled = false;
}

// 風船ゲーム
let bombIndex = -1;
let gameOver = false;


function startBalloon() {

  gameOver = false;

  document.getElementById("balloonRule").style.display = "none";

  document.getElementById("startBtn").style.display = "none";

  
  // ✅ ボタン戻す
  document.getElementById("balloonControls").style.display = "block";

  // ✅ 結果隠す
  document.getElementById("balloonResult").classList.remove("show");


  const area = document.getElementById("balloonArea");
  area.innerHTML = "";

  const total = 25;
  let opened = 0

  // 💥 爆弾位置
  bombIndex = Math.floor(Math.random() * total);

  for (let i = 0; i < total; i++) {

    const b = document.createElement("div");
    b.className = "balloon";
    b.textContent = "🎈";

    b.onclick = function () {

      if (gameOver) return;

      // すでに割ってたら何もしない
      if (b.textContent !== "🎈") return;

      if (i === bombIndex) {
        b.textContent = "💥";

        gameOver = true;

        shakeScreen();
        endBalloon("💥 爆発！負け！");
      } else {
        b.textContent = "🎉";

        
      opened++;

      if (opened === total - 1) {

        endBalloon("🎉 全部成功！");
      }


      }

    };

    area.appendChild(b);
  }
}

function endBalloon(text) {

  gameOver = true;

  // 結果表示
  const box = document.getElementById("balloonResult");
  const txt = document.getElementById("balloonText");

  txt.textContent = text;
  box.classList.add("show");

  // ✅ 下のボタン消す
  document.getElementById("balloonControls").style.display = "none";
}

function shakeScreen() {
  document.body.classList.add("shake");

  setTimeout(() => {
    document.body.classList.remove("shake");
  }, 300);
}

function resetBalloon() {

  gameOver = false;

  
  document.getElementById("balloonRule").style.display = "block";

  // 風船削除
  document.getElementById("balloonArea").innerHTML = "";

  // 結果消す
  document.getElementById("balloonResult").classList.remove("show");

  // ボタン戻す
  document.getElementById("balloonControls").style.display = "block";

  document.getElementById("startBtn").style.display = "block";
}
